<!DOCTYPE html>
<html lang = "ru">
    <head>
        <meta charset = "UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Динамическая страница</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                padding: 20px;
            }

            #welcome {
                display: none;
                margin-top: 20px;
                font-size: 20px;
                color: green;
            }

            .fade {
                opacity: 0;
                transition: opacity 0.6s ease;
            }

            .fade.show {
                opacity: 1;
            }

            .dark {
                background-color: #222;
                color: #eee;
            }

            .dark input {
                background-color: #333;
                color: #fff;
                border: 1px solid #555;
            }

            .dark button {
                background-color: #444;
                color: #fff;
            }

            .fade-out {
                opacity: 0;
                transition: opacity 0.6s ease;
            }

            #h_1 {
                color: rgb(74, 74, 73);
                font-size: 25px;
                padding: 15px;
                margin: 10px;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            }
            
            #h_2 {
                padding: 10px;
                font-family: Arial, Helvetica, sans-serif;
                color:#555;
                font-size: 10px;
            }

            #h_3 {
                padding: 10px;
                font-family: Arial, Helvetica, sans-serif;
                color:#555;
                font-size: 10px;
            }

            .counter {
                animation: counter 0.2s ease;
            }

            @keyframes counter {
                0% { transform: scale(1); }
                50% { transform: scale(1.2); }
                100% { transform: scale(1); }
            }

        </style>

    </head>
    <body>
        <h1 id="h_1">Добро пожаловать!</h1>

        <h2><i><b>Это мой динамический сайт.</i></b></h2>

        <h3><i><b>И я его развиваю!</b></i></h3>

        <button id="themeBtn">Тёмная тема</button>

        <label>Введите имя:</label>
        <input id="username" type="text" placeholder="Ваше имя">

        <button id="btn">Поприветствовать</button>

        <p id="counter">Нажатий: 0</p>

        <div id="welcome" class="fade"></div>

        <script src="script.js"></script>
    </body>
</html>
